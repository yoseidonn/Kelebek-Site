{% extends "partials/base.html" %} 
{% load static %} 
{% block content %}

<div class="About-bg custom-title">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <div class="aboutheading">
          <h3>İletişim</h3>
        </div>
      </div>
    </div>
  </div>
</div>

{% if messages %} {% for message in messages %}
      <div class="alert alert-{{message.tags}} custom-title">{{message}}</div>
      {% endfor %} {% endif %}

<form class="custom-form" action="">
  {% csrf_token %} {{ form }} <br /><button
    class="btn btn-dark"
    style=""
    type="submit"
  >
    Gönder
  </button>
</form>
<br />
{% endblock %}
