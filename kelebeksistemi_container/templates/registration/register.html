{% extends "partials/base.html" %} 
{% load static %} 
{% block content %}
<div class="About-bg custom-title">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <div class="aboutheading">
          <h3><span class="orange_color">Kaydol</span></h3>
        </div>
      </div>
    </div>
  </div>
</div>

{% if messages %} {% for message in messages %}
      <div class="alert alert-{{message.tags}} custom-title">{{message}}</div>
      {% endfor %} {% endif %}
      
<form class="login custom-form" method="post">
  {% csrf_token %} {{ form }}
  <div class="form-text">
    Hesabın var mı? <a href="/accounts/login">Giriş yap!</a>
  </div>
  <br />
  <button type="submit" class="btn btn-success">Kaydol</button>
</form>
{% endblock %}
