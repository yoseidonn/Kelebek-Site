{% extends "partials/base.html" %} {% load static %} {% block content %}
<div class="About-bg custom-title">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <div class="aboutheading">
          <h3><span class="orange_color">Giriş yap</span></h3>
        </div>
      </div>
    </div>
  </div>
</div>

{% if messages %} {% for message in messages %}
<div class="alert alert-{{message.tags}} custom-title">{{message}}</div>
{% endfor %} {% endif %}

<form class="login custom-form" method="post">
  {% csrf_token %} {{ form }}
  <div class="form-text">
    Hesabın yok mu? Hemen bir tane <a href="/accounts/register">oluştur!</a>
  </div>
  <br />
  <button type="submit" class="btn btn-success">Giriş yap</button>
</form>
{% endblock %}
